spring:
  application:
    name: catalog-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5000}/${POSTGRES_DB:craft_beer_store}
    username: ${POSTGRES_USER:craft_beer_user}
    password: ${POSTGRES_PASSWORD:craft_beer_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    enabled: false

server:
  port: ${SERVER_PORT:8081}

grpc:
  server:
    port: ${GRPC_PORT:9091}
