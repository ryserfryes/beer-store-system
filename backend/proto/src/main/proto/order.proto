syntax = "proto3";
package order;
option java_package = "com.beerstoresystem.proto.order";
option java_multiple_files = true;

service OrderGrpcService {
  rpc HasCustomerPurchased (HasCustomerPurchasedRequest) returns (HasCustomerPurchasedResponse);
}

message HasCustomerPurchasedRequest {
  int64 customer_id = 1;
  int64 beer_id = 2;
}

message HasCustomerPurchasedResponse {
  bool has_purchased = 1;
  int64 order_id = 2;
}
