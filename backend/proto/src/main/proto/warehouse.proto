syntax = "proto3";
package warehouse;
option java_package = "com.beerstoresystem.proto.warehouse";
option java_multiple_files = true;

service WarehouseGrpcService {
  rpc GetPickupPoints (GetPickupPointsRequest) returns (GetPickupPointsResponse);
  rpc CheckStock (CheckStockRequest) returns (CheckStockResponse);
  rpc ReserveStock (ReserveStockRequest) returns (ReserveStockResponse);
}

message GetPickupPointsRequest {
  bool active_only = 1;
}

message GetPickupPointsResponse {
  repeated PickupPointProto pickup_points = 1;
}

message PickupPointProto {
  int64 id = 1;
  string name = 2;
  string city = 3;
  string address_line = 4;
  string working_hours = 5;
  bool is_active = 6;
}

message CheckStockRequest {
  repeated StockCheckItem items = 1;
}

message StockCheckItem {
  int64 variant_id = 1;
  int32 quantity = 2;
}

message CheckStockResponse {
  bool all_available = 1;
  repeated StockAvailability availability = 2;
}

message StockAvailability {
  int64 variant_id = 1;
  int32 quantity_on_hand = 2;
  bool available = 3;
}

message ReserveStockRequest {
  int64 order_id = 1;
  repeated StockCheckItem items = 2;
}

message ReserveStockResponse {
  bool success = 1;
  repeated ReservedBatch reserved = 2;
}

message ReservedBatch {
  int64 variant_id = 1;
  int64 batch_id = 2;
  int32 quantity = 3;
}
