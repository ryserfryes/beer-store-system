global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    
  - job_name: 'minio'
    metrics_path: /minio/v2/metrics/cluster
    static_configs:
      - targets: ['minio:9000']
  
  - job_name: 'backup-exporter'
    static_configs:
      - targets: ['backup:9091']

  - job_name: 'patroni'
    scrape_interval: 5s
    scrape_timeout: 4s
    static_configs:
      - targets: ['pg-node1:8008', 'pg-node2:8008', 'pg-node3:8008']
    metrics_path: /metrics

  - job_name: 'etcd'
    static_configs:
      - targets: ['etcd1:2379', 'etcd2:2379', 'etcd3:2379']
    metrics_path: /metrics